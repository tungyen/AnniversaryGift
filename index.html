<!DOCTYPE html>
<html lang="zh-TW">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Happy Anniversary ❤️</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="data:,">

</head>

<body>

    <div id="heart-progress"></div>

    <button id="bgm-toggle-button">🎵</button>

    <div id="app">
        <section id="home-screen" class="screen">
            <div class="card">
                <div class="hero-heart-wrapper fade-item">
                    <div class="hero-heart">
                        ❤️
                    </div>
                </div>

                <h1 class="fade-item">兩周年紀念日快樂我的鼻鼻</h1>

                <p class="fade-item">一份送給妳的小驚喜</p>

                <p id="days-together" class="fade-item days-together"></p>

                <button
                    id="start-button"
                    class="primary-button fade-item">
                    開始旅程
                </button>

            </div>

        </section>


        <section
            id="question-flow-screen"
            class="screen hidden">
            <div class="question-card">
                <div class="question-header">
                    💕
                    <span id="question-number"> </span>
                </div>

                <h2 id="question-title"></h2>
                <div id="options-container"></div>
            </div>

            <div class="memory-card hidden">
                <div class="memory-heart">❤️</div>
                <img
                    id="memory-image"
                    src=""
                    alt="memory">

                <h2 id="memory-title"></h2>
                <p id="memory-text"></p>

                <button
                    id="memory-next-button"
                    class="primary-button">
                    繼續旅程❤️
                </button>
            </div>
        </section>

        <section
            id="ending-screen"
            class="screen hidden">

            <div class="card ending-intro">
                <div class="hero-heart-wrapper fade-item">
                    <div class="hero-heart">❤️</div>
                </div>
                <h1 class="fade-item">恭喜完成！</h1>
                <p class="fade-item">妳陪我完成了所有回憶 ❤️</p>

                <button
                    id="play-video-button"
                    class="primary-button fade-item">
                    播放我們的回憶影片 🎬
                </button>
            </div>

             <div class="card ending-final hidden">
                <div class="hero-heart-wrapper fade-item">
                    <div class="hero-heart">❤️</div>
                </div>

                <h1 class="fade-item">兩周年紀念日快樂</h1>
                <p class="fade-item">謝謝妳一直陪在我身邊，未來也是 ❤️</p>

                <button
                    id="restart-button"
                    class="primary-button fade-item">
                    重新開始 🔄
                </button>
            </div>
        </section>
    </div>

    <!--Model-->
    <div id="modal-overlay" class="hidden">
        <div id="modal">
            <div id="modal-emoji">🥺</div>
            <h2 id="modal-title">妳真的確定嗎？</h2>
            <p id="modal-message">再想想看嘛 ❤️</p>
            <button id="modal-button"
                    class="modal-button">
                再看看
            </button>
        </div>
    </div>

    <!--Ending Video Overlay-->
    <div id="video-overlay" class="hidden">
        <video
            id="ending-video"
            src="assets/videos/anniversary.mp4"
            playsinline>
        </video>

        <button id="skip-video-button">
            跳過 ✕
        </button>
    </div>

    <!--Photo Lightbox-->
    <div id="photo-lightbox" class="hidden">
        <img id="lightbox-image" src="" alt="memory large">
        <button id="lightbox-close-button">✕</button>
    </div>

    <script 
        type="module"
        src="js/app.js">
    </script>

</body>
</html>
