<!DOCTYPE html>
<html lang="zh-TW">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Happy Anniversary ❤️</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <div id="app">

        <!-- 首頁 -->
        <section id="home-screen" class="screen">

            <div class="card">

                <div class="heart">

                    ❤️

                </div>

                <h1>

                    Happy Anniversary

                </h1>

                <p>

                    一份送給妳的小驚喜

                </p>

                <button id="start-button">

                    開始旅程

                </button>

            </div>

        </section>


        <!-- 題目頁 -->
        <section
        id="question-screen"
        class="screen hidden">

            <div class="question-card">

                <h1 id="question-title">

                </h1>

                <div id="options-container">

                </div>

            </div>

        </section>


        <!-- 結束頁 -->

        <section
            id="ending-screen"
            class="screen hidden">

            <h1>

                Ending

            </h1>

        </section>

    </div>

    <script 
        type="module"
        src="js/app.js">
    </script>

</body>

</html>
