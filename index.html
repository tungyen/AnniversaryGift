<!DOCTYPE html>
<html lang="zh-TW">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Happy Anniversary ❤️</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <div id="heart-progress"></div>

    <div id="app">
        <section id="home-screen" class="screen">
            <div class="card">
                <div class="hero-heart-wrapper fade-item">
                    <div class="hero-heart">
                        ❤️
                    </div>
                </div>

                <h1 class="fade-item">兩周年紀念日快樂我的鼻鼻</h1>

                <p class="fade-item">一份送給妳的小驚喜</p>

                <button
                    id="start-button"
                    class="primary-button fade-item">
                    開始旅程
                </button>

            </div>

        </section>


        <section
            id="question-flow-screen"
            class="screen hidden">
            <div class="question-card">
                <div class="question-header">
                    💕
                    <span id="question-number"> </span>
                </div>

                <h2 id="question-title"></h2>
                <div id="options-container"></div>
            </div>

            <div class="memory-card hidden">
                <div class="memory-heart">❤️</div>
                <img
                    id="memory-image"
                    src=""
                    alt="memory">

                <h2 id="memory-title"></h2>
                <p id="memory-text"></p>

                <button
                    id="memory-next-button"
                    class="primary-button">
                    繼續旅程❤️
                </button>
            </div>
        </section>

        <section
            id="ending-screen"
            class="screen hidden">

            <div class="card">
                <div class="hero-heart">❤️</div>
                <h1>恭喜完成！</h1>
                <p>妳陪我完成了所有回憶 ❤️</p>
            </div>
        </section>
    </div>

    <!--Model-->
    <div id="modal-overlay" class="hidden">
        <div id="modal">
            <div id="modal-emoji">🥺</div>
            <h2 id="modal-title">妳真的確定嗎？</h2>
            <p id="modal-message">再想想看嘛 ❤️</p>
            <button id="modal-button"
                    class="modal-button">
                再看看
            </button>
        </div>
    </div>

    <script 
        type="module"
        src="js/app.js">
    </script>

</body>
</html>
