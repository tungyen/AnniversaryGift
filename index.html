<!DOCTYPE html>
<html lang="zh-TW">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Happy Anniversary ❤️</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <div id="heart-progress">
        ♡♡♡♡♡
    </div>

    <div id="app">
        <section id="home-screen" class="screen">
            <div class="card">
                <div class="heart">
                    ❤️
                </div>

                <h1>
                    Happy Anniversary
                </h1>

                <p>
                    一份送給妳的小驚喜
                </p>

                <button id="start-button">
                    開始旅程
                </button>

            </div>

        </section>


        <section
        id="question-screen"
        class="screen hidden">

            <div class="question-card">

                <h2 id="question-title">

                </h2>

                <div id="options-container">

                </div>

            </div>

        </section>


        <section
            id="ending-screen"
            class="screen hidden">

            <h1>
                Coming Soon...
            </h1>
        </section>

    </div>

    <!--Model-->
    <div id="modal-overlay" class="hidden">
        <div id="modal">
            <div id="modal-emoji">
                🥺
            </div>
            <h2 id="modal-title">
                妳真的確定嗎？
            </h2>
            <p id="modal-message">
                再想想看嘛 ❤️
            </p>
            <button id="modal-button">
                再看看
            </button>
        </div>
    </div>

    <script 
        type="module"
        src="js/app.js">
    </script>

</body>

</html>
